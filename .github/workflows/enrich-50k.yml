name: Enrich Top 50k Brands

on:
  schedule:
    # Requested every 20 min; GitHub throttles scheduled runs on busy runners,
    # so in practice this fires roughly every 1-2 hours. Each run processes
    # up to 200 domains at concurrency 6 (~20 min). ~12 runs/day × 200 =
    # ~2,400/day → the top-50k cohort stays refreshed on a ~21-day cycle.
    - cron: '*/20 * * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: 'Domains per batch fetch'
        default: '200'
      max_total:
        description: 'Max total to enrich this run'
        default: '200'

concurrency:
  group: enrich-50k
  cancel-in-progress: false

jobs:
  enrich:
    name: Enrich batch
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run enrichment worker
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROWTH_SIGNALS_API_BASE: ${{ secrets.GROWTH_SIGNALS_API_BASE }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          CONCURRENCY: '6'
          SKIP_DAYS: '30'
          MAX_RETRIES: '2'
        run: |
          BATCH=${{ github.event.inputs.batch || '200' }}
          MAX=${{ github.event.inputs.max_total || '200' }}
          node scripts/worker.mjs $BATCH $MAX
